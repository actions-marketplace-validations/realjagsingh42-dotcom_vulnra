# ─────────────────────────────────────────────
#  VULNRA — CI Pipeline
#  Runs on every push to main and every PR
# ─────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Lint ────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check app/

      - name: Run Ruff formatter check
        run: ruff format --check app/


  # ── 2. Test ────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false


  # ── 3. Docker Build ────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vulnra:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

      - name: Smoke test container
        run: |
          docker run -d \
            --name vulnra-smoke \
            -e REDIS_URL=redis://localhost:6379 \
            -e SECRET_KEY=ci-smoke-test \
            -p 8000:8000 \
            vulnra:ci-${{ github.sha }}

          # Wait for the container to start
          sleep 8

          # Hit the health endpoint
          curl --fail --retry 3 --retry-delay 3 http://localhost:8000/health

          docker stop vulnra-smoke


  # ── 4. Security Scan ──────────────────────
  security:
    name: Security Scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969


  # ── 5. PR Summary Comment ─────────────────
  comment:
    name: Post CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, docker, security]
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Post status comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              lint:     '${{ needs.lint.result }}',
              test:     '${{ needs.test.result }}',
              docker:   '${{ needs.docker.result }}',
              security: '${{ needs.security.result }}',
            };

            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');

            const body = `## CI Results ${allPassed ? '— All checks passed ✅' : '— Some checks failed ❌'}

            | Check | Result |
            |---|---|
            | Lint (Ruff) | ${icon(jobs.lint)} ${jobs.lint} |
            | Tests | ${icon(jobs.test)} ${jobs.test} |
            | Docker Build | ${icon(jobs.docker)} ${jobs.docker} |
            | Security Scan | ${icon(jobs.security)} ${jobs.security} |

            ${allPassed ? '_Ready to merge._' : '_Please fix the failing checks before merging._'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
