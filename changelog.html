<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="Every VULNRA release, feature update, and bug fix.">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "VULNRA Changelog",
    "description": "Release notes and product updates for VULNRA LLM security scanner.",
    "url": "https://vulnra.ai/changelog"

  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #060608;
      --bg1: #0a0b0f;
      --bg2: #0f1117;
      --bg3: #151820;
      --acid: #b8ff57;
      --acid2: rgba(184, 255, 87, 0.08);
      --acid3: rgba(184, 255, 87, 0.18);
      --red: #ff3c5a;
      --amber: #ffb340;
      --blue: #4db8ff;
      --teal: #3dffaa;
      --text: #e8edf4;
      --muted: rgba(232, 237, 244, 0.42);
      --muted2: rgba(232, 237, 244, 0.2);
      --muted3: rgba(232, 237, 244, 0.1);
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.04);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9998;
    }

    body::after {
      content: '';
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9997;
      animation: grain 0.4s steps(1) infinite;
    }

    @keyframes grain {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(-3%, -4%);
      }

      40% {
        transform: translate(-6%, 3%);
      }

      60% {
        transform: translate(3%, -2%);
      }

      80% {
        transform: translate(-4%, 6%);
      }

      100% {
        transform: translate(5%, -3%);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .3;
        transform: scale(.6);
      }
    }

    @keyframes orb1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(80px, -60px) scale(1.15);
      }
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      100% {
        left: 200%;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--acid);
    }

    ::selection {
      background: var(--acid);
      color: #000;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 60px;
      background: rgba(6, 6, 8, .9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border2);
    }

    nav::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184, 255, 87, .3), transparent);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      background: #060608;
      border: 1.5px solid #b8ff57;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: neonBoxPulse 2s ease-in-out infinite;
      flex-shrink: 0;
      position: relative;
    }

    .nav-logo-mark::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      border: 1px solid rgba(184, 255, 87, .25);
      animation: expandRing 2s ease-out infinite;
      pointer-events: none;
    }

    .nsq {
      fill: #b8ff57;
    }

    .nsq1 {
      animation: neonSqSeq 2.4s ease-in-out infinite 0s;
    }

    .nsq2 {
      animation: neonSqSeq 2.4s ease-in-out infinite .3s;
    }

    .nsq3 {
      animation: neonSqSeq 2.4s ease-in-out infinite .6s;
    }

    .nsq4 {
      animation: neonSqSeq 2.4s ease-in-out infinite .9s;
    }

    .ndot1 {
      fill: #b8ff57;
      animation: neonDotPulse 1.2s ease-in-out infinite 0s;
    }

    .ndot2 {
      fill: #b8ff57;
      animation: neonDotPulse 1.2s ease-in-out infinite .5s;
    }

    @keyframes neonBoxPulse {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(184, 255, 87, .4), 0 0 20px rgba(184, 255, 87, .15), inset 0 0 10px rgba(184, 255, 87, .04);
        border-color: rgba(184, 255, 87, .9);
      }

      50% {
        box-shadow: 0 0 16px rgba(184, 255, 87, .7), 0 0 40px rgba(184, 255, 87, .3), 0 0 80px rgba(184, 255, 87, .1), inset 0 0 20px rgba(184, 255, 87, .08);
        border-color: #d4ff8a;
      }
    }

    @keyframes expandRing {
      0% {
        transform: scale(1);
        opacity: .7;
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    @keyframes neonSqSeq {

      0%,
      100% {
        opacity: 1;
        filter: drop-shadow(0 0 3px rgba(184, 255, 87, .9)) drop-shadow(0 0 7px rgba(184, 255, 87, .5));
      }

      40%,
      60% {
        opacity: .08;
        filter: none;
      }
    }

    @keyframes neonDotPulse {

      0%,
      100% {
        opacity: 1;
        filter: drop-shadow(0 0 4px #b8ff57) drop-shadow(0 0 8px rgba(184, 255, 87, .6));
      }

      50% {
        opacity: .1;
        filter: none;
      }
    }

    .nav-logo-mark svg {
      width: 14px;
      height: 14px;
    }

    .nav-logo em {
      font-style: normal;
      color: var(--acid);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .1em;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--acid);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-acid {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .12em;
      background: var(--acid);
      color: #000;
      border: none;
      padding: 8px 18px;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }

    .btn-acid:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(184, 255, 87, .3);
    }

    /* HERO */
    .hero {
      padding: 140px 48px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, .02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .02) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .orb-1 {
      width: 600px;
      height: 400px;
      background: rgba(184, 255, 87, .07);
      top: -10%;
      right: 10%;
      animation: orb1 14s ease-in-out infinite;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 48px;
    }

    /* ...Rest of styles... */
  </style>
</head>

<body>

  <!-- VULNRA Loader -->
  <div id="vLoader" style="
    position:fixed;inset:0;background:#060608;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9990;transition:opacity .5s ease,visibility .5s ease;
    font-family:'IBM Plex Mono',monospace;gap:0;
  ">
    <!-- corners -->
    <div
      style="position:absolute;top:28px;left:28px;width:24px;height:24px;border-top:1px solid rgba(184,255,87,.35);border-left:1px solid rgba(184,255,87,.35)">
    </div>
    <div
      style="position:absolute;top:28px;right:28px;width:24px;height:24px;border-top:1px solid rgba(184,255,87,.35);border-right:1px solid rgba(184,255,87,.35)">
    </div>
    <div
      style="position:absolute;bottom:28px;left:28px;width:24px;height:24px;border-bottom:1px solid rgba(184,255,87,.35);border-left:1px solid rgba(184,255,87,.35)">
    </div>
    <div
      style="position:absolute;bottom:28px;right:28px;width:24px;height:24px;border-bottom:1px solid rgba(184,255,87,.35);border-right:1px solid rgba(184,255,87,.35)">
    </div>

    <!-- mark -->
    <div style="position:relative;margin-bottom:36px;">
      <div
        style="position:absolute;inset:-20px;border-radius:50%;border:1px solid transparent;border-top-color:rgba(184,255,87,.6);border-right-color:rgba(184,255,87,.12);animation:vOrbit 2s linear infinite;">
      </div>
      <div
        style="position:absolute;inset:-12px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(184,255,87,.35);border-left-color:rgba(184,255,87,.08);animation:vOrbit 3.2s linear infinite reverse;">
      </div>
      <div
        style="width:72px;height:72px;border-radius:13px;background:#060608;border:1.5px solid #b8ff57;display:flex;align-items:center;justify-content:center;animation:neonBoxPulse 2s ease-in-out infinite;position:relative;">
        <div
          style="position:absolute;inset:-1px;border-radius:inherit;border:1px solid rgba(184,255,87,.25);animation:expandRing 2s ease-out infinite;pointer-events:none;">
        </div>
        <svg width="38" height="38" viewBox="0 0 20 20" fill="none">
          <rect class="nsq nsq1" x="1" y="1" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq2" x="11.5" y="1" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq3" x="1" y="11.5" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq4" x="11.5" y="11.5" width="7.5" height="7.5" rx=".8" />
          <circle class="ndot1" cx="14.25" cy="16.75" r="1.1" />
          <circle class="ndot2" cx="17.25" cy="16.75" r="1.1" />
        </svg>
      </div>
    </div>

    <!-- title + status -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px;">
      <div
        style="font-size:13px;font-weight:700;letter-spacing:.2em;color:#b8ff57;text-shadow:0 0 12px rgba(184,255,87,.5)">
        VULNRA</div>
      <div
        style="display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.14em;color:rgba(184,255,87,.45);">
        <span id="vLoaderStatus">INITIALISING</span>
        <span
          style="display:inline-block;width:7px;height:11px;background:#b8ff57;animation:vBlink .7s steps(1) infinite;box-shadow:0 0 6px #b8ff57;"></span>
      </div>
    </div>

    <!-- progress -->
    <div style="width:220px;display:flex;flex-direction:column;gap:6px;">
      <div
        style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:.14em;color:rgba(184,255,87,.3);">
        <span>BOOT SEQUENCE</span>
        <span id="vLoaderPct">0%</span>
      </div>
      <div style="height:2px;background:rgba(184,255,87,.1);border-radius:1px;overflow:hidden;">
        <div id="vLoaderBar"
          style="height:100%;width:0%;background:#b8ff57;border-radius:1px;box-shadow:0 0 8px rgba(184,255,87,.7);transition:width .2s ease;">
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes vOrbit {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes vBlink {

      0%,
      50% {
        opacity: 1
      }

      51%,
      100% {
        opacity: 0
      }
    }
  </style>

  <script>
    (function () {
      const msgs = ['INITIALISING', 'LOADING PROBES', 'MAPPING FRAMEWORKS', 'VERIFYING AUTH', 'READY'];
      const bar = document.getElementById('vLoaderBar');
      const pct = document.getElementById('vLoaderPct');
      const status = document.getElementById('vLoaderStatus');
      const loader = document.getElementById('vLoader');
      let p = 0, mi = 0;
      const iv = setInterval(() => {
        p = Math.min(100, p + 1.4 + Math.random());
        bar.style.width = p + '%';
        pct.textContent = Math.floor(p) + '%';
        mi = Math.floor((p / 100) * (msgs.length - 1));
        status.textContent = msgs[mi];
        if (p >= 100) {
          clearInterval(iv);
          bar.style.width = '100%';
          pct.textContent = '100%';
          status.textContent = 'READY';
          setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
          }, 300);
        }
      }, 28);
    })();
  </script>
  <!-- END Loader -->

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <rect class="nsq nsq1" x="1" y="1" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq2" x="11.5" y="1" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq3" x="1" y="11.5" width="7.5" height="7.5" rx=".8" />
          <rect class="nsq nsq4" x="11.5" y="11.5" width="7.5" height="7.5" rx=".8" />
          <circle class="ndot1" cx="14.25" cy="16.75" r="1.1" />
          <circle class="ndot2" cx="17.25" cy="16.75" r="1.1" />
        </svg>
      </div>
      VULN<em>RA</em>
    </a>
  </nav>

  <!-- ...Rest of body... -->
</body>

</html>
