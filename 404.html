    <style>
        *,
        *::before,

        :root {
            --bg: #060608;

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center
        }

        .container {

            padding: 24px

        .glitch {
            font-family: var(--mono);

        h1 {
            font-family: var(--mono);
            font-size: 18px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 32px;
            color: var(--muted)
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 48px;
            font-weight: 300
        }

        .btn-acid {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .1em;
            background: var(--acid);
            color: #000;
            padding: 12px 32px;
            border-radius: 4px;
            text-decoration: none;
            transition: all .2s;
            display: inline-block
        }

        .btn-acid:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(184, 255, 87, .3)
        }

        .links {
            margin-top: 48px;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-family: var(--mono);
            font-size: 10px
        }

        .links a {
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.1em
        }

        .links a:hover {
